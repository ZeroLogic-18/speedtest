<html lang="id">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=JetBrains+Mono:wght@400;700&display=swap');
        
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #111424; 
            color: #ffffff;
            overflow-x: hidden;
        }
        .font-mono { font-family: 'JetBrains Mono', monospace; }
        
        /* Styling Tombol GO */
        .go-button {
            width: 220px;
            height: 220px;
            border-radius: 50%;
            border: 2px solid #06b6d4; 
            background: transparent;
            color: #ffffff;
            font-size: 3.5rem;
            font-weight: 300;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
        }
        .go-button:hover {
            box-shadow: 0 0 30px rgba(6, 182, 212, 0.4), inset 0 0 20px rgba(6, 182, 212, 0.2);
            text-shadow: 0 0 10px rgba(255,255,255,0.5);
        }
        .go-button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            box-shadow: none;
        }

        /* Styling Dropdown Change Server biar nyatu & rapi */
        .server-select {
            appearance: none;
            background-color: transparent;
            color: #06b6d4; 
            font-size: 0.875rem;
            cursor: pointer;
            outline: none;
            border: none;
            padding: 0;
            margin-top: 4px;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .server-select option {
            background-color: #111424;
            color: #ffffff;
        }

        /* Transisi UI */
        .fade-transition { transition: opacity 0.5s ease, transform 0.5s ease; }
        .hidden-ui { opacity: 0; pointer-events: none; position: absolute; transform: scale(0.95); }
        .active-ui { opacity: 1; pointer-events: auto; position: relative; transform: scale(1); }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #111424; }
        ::-webkit-scrollbar-thumb { background: #374151; border-radius: 4px; }
    </style>
</head>

            { id: 103, name: "Fakfak (Telkom Indonesia)", lat: -2.9231, lon: 132.2961, dlURL: CF_DOWN, ulURL: CF_UP },
            { id: 104, name: "Manokwari (XL Axiata)", lat: -0.8614, lon: 134.0620, dlURL: CF_DOWN, ulURL: CF_UP },
            { id: 105, name: "Nabire (Biznet Networks)", lat: -3.3667, lon: 135.5000, dlURL: CF_DOWN, ulURL: CF_UP },
            { id: 106, name: "Biak (Telkomsel)", lat: -1.1833, lon: 136.0833, dlURL: CF_DOWN, ulURL: CF_UP },
            { id: 107, name: "Timika (Palapa Ring)", lat: -4.5296, lon: 136.8836, dlURL: CF_DOWN, ulURL: CF_UP },
            { id: 108, name: "Jayapura (Indosat)", lat: -2.5333, lon: 140.7167, dlURL: CF_DOWN, ulURL: CF_UP },
            { id: 109, name: "Wamena (Telkomsel)", lat: -4.0980, lon: 138.9489, dlURL: CF_DOWN, ulURL: CF_UP },
            { id: 110, name: "Merauke (Telkom Indonesia)", lat: -8.4990, lon: 140.4019, dlURL: CF_DOWN, ulURL: CF_UP }
        ];

        let userLat = -6.2088, userLon = 106.8456;
        let selectedServer = null;
        let finalDlSpeed = 0; 
        const TEST_DURATION = 12000; 
        const THREADS = 4;

        function getDistanceKm(lat1, lon1, lat2, lon2) {
            const R = 6371; 
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon/2) * Math.sin(dLon/2);
            return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a))); 
        }

        // ==========================================
        // INISIALISASI LOKASI (Fast Detection)
        // ==========================================
        async function initSystem() {
            try {
                const traceRes = await fetch('https://cloudflare.com/cdn-cgi/trace');
                const traceText = await traceRes.text();
                const userIp = (traceText.match(/ip=(.*)/) || [])[1] || '--';
                document.getElementById('client-ip').innerText = userIp;

                const locRes = await fetch(`http://ip-api.com/json/${userIp}`);
                const data = await locRes.json();
                if(data.status === "success") {
                    let ispName = data.isp.length > 20 ? data.isp.substring(0, 20) + '...' : data.isp;
                    document.getElementById('client-isp').innerText = ispName.toUpperCase();
                    userLat = data.lat; userLon = data.lon;
                }
            } catch(e) {
                document.getElementById('client-isp').innerText = "PRIVATE NETWORK";
            }

            if ("geolocation" in navigator) {
                navigator.geolocation.getCurrentPosition(
                    (position) => { userLat = position.coords.latitude; userLon = position.coords.longitude; processServerList(); },
                    (error) => { processServerList(); }, 
                    { enableHighAccuracy: true, timeout: 3000 }
                );
            } else {
                processServerList();
            }
        }

        function processServerList() {
            serverDatabase.forEach(srv => { srv.distance = getDistanceKm(userLat, userLon, srv.lat, srv.lon); });
            serverDatabase.sort((a, b) => a.distance - b.distance);

            const selectBox = document.getElementById('server-select');
            selectBox.innerHTML = "";
            serverDatabase.forEach(srv => {
                let opt = document.createElement('option');
                opt.value = srv.id;
                opt.text = `Change Server (${srv.name})`; 
                selectBox.appendChild(opt);
            });

            selectedServer = serverDatabase[0];
            updateServerDisplay();
            
            document.getElementById('server-select').disabled = false;
            
            const btnGo = document.getElementById('go-btn');
            btnGo.innerText = "GO";
            btnGo.disabled = false;
        }

        function changeServer() {
            const val = document.getElementById('server-select').value;
            selectedServer = serverDatabase.find(s => s.id == val);
            if(selectedServer) updateServerDisplay();
        }

        function updateServerDisplay() {
            const parts = selectedServer.name.split(' (');
            const mainName = parts[1] ? parts[1].replace(')', '') : selectedServer.name;
            const location = parts[0];
            document.getElementById('server-name-display').innerHTML = `${mainName.toUpperCase()} <br><span class="text-sm text-gray-400 font-normal mt-1">${location}</span>`;
        }

        // ==========================================
        // UI TRANSISI & CHART
        // ==========================================
        function switchView(isTesting) {
            const idle = document.getElementById('idle-view');
            const test = document.getElementById('test-view');
            if(isTesting) {
                idle.classList.remove('active-ui'); idle.classList.add('hidden-ui');
                setTimeout(() => { test.classList.remove('hidden-ui'); test.classList.add('active-ui'); }, 500);
            } else {
                test.classList.remove('active-ui'); test.classList.add('hidden-ui');
                setTimeout(() => { idle.classList.remove('hidden-ui'); idle.classList.add('active-ui'); }, 500);
            }
        }

        function resetUI() {
            document.getElementById('again-btn').style.display = 'none';
            ['ping-val', 'jitter-val', 'dl-val', 'ul-val'].forEach(id => document.getElementById(id).innerText = '--');
            speedChart.data.labels = []; speedChart.data.datasets[0].data = []; speedChart.update();
            switchView(false);
        }

        const ctx = document.getElementById('speedChart').getContext('2d');
        let speedChart = new Chart(ctx, {
            type: 'line',
            data: { labels: [], datasets: [{ data: [], borderColor: '#06b6d4', backgroundColor: 'transparent', borderWidth: 3, tension: 0.4, pointRadius: 0 }] },
            options: { responsive: true, maintainAspectRatio: false, animation: { duration: 150 }, scales: { x: { display: false }, y: { display: false, beginAtZero: true } }, plugins: { legend: { display: false } }, layout: { padding: 0 } }
        });

        // ==========================================
        // CORE SPEED ENGINE (HYBRID)
        // ==========================================
        async function startEngine() {
            switchView(true);
            const statusTxt = document.getElementById('status-text');
            document.getElementById('again-btn').style.display = 'none';
            finalDlSpeed = 0;

            try {
                // PING & JITTER
                statusTxt.innerText = "Finding optimal server...";
                let pings = [];
                for(let i=0; i<5; i++) {
                    let pStart = performance.now();
                    await fetch(`${selectedServer.dlURL.split('?')[0]}?bytes=0&t=${Math.random()}`, { cache: 'no-store' });
                    pings.push(performance.now() - pStart);
                }
                document.getElementById('ping-val').innerText = Math.round(pings.reduce((a,b)=>a+b,0) / pings.length);
                document.getElementById('jitter-val').innerText = Math.round(Math.max(...pings) - Math.min(...pings));

                // DOWNLOAD
                statusTxt.innerText = "Testing Download...";
                speedChart.data.datasets[0].borderColor = '#06b6d4'; 
                
                let dlWorkers = [];
                let totalDlLoaded = 0, lastTotalDl = 0, smoothedDlSpeed = 0, dlActive = true;
                let dlStartTime = performance.now(), dlLastTime = dlStartTime;

                let dlInterval = setInterval(() => {
                    if(!dlActive) { clearInterval(dlInterval); return; }
                    let now = performance.now();
                    let duration = (now - dlLastTime) / 1000;
                    if(duration > 0.1) {
                        let instantMbps = (((totalDlLoaded - lastTotalDl) * 8) / duration) / 1048576;
                        smoothedDlSpeed = smoothedDlSpeed === 0 ? instantMbps : (smoothedDlSpeed * 0.7) + (instantMbps * 0.3);
                        document.getElementById('dl-val').innerText = smoothedDlSpeed.toFixed(1);
                        finalDlSpeed = smoothedDlSpeed; 
                        speedChart.data.labels.push(''); speedChart.data.datasets[0].data.push(smoothedDlSpeed); speedChart.update();
                        lastTotalDl = totalDlLoaded; dlLastTime = now;
                    }
                }, 100);

                for(let i=0; i<THREADS; i++) {
                    dlWorkers.push(new Promise((resolve) => {
                        function run() {
                            if(performance.now() - dlStartTime > TEST_DURATION) { resolve(); return; }
                            const xhr = new XMLHttpRequest();
                            let myLastLoaded = 0;
                            xhr.onprogress = (e) => {
                                if(performance.now() - dlStartTime > TEST_DURATION) { xhr.abort(); resolve(); return; }
                                totalDlLoaded += (e.loaded - myLastLoaded); myLastLoaded = e.loaded;
                            };
                            xhr.onload = run; xhr.onerror = run;
                            xhr.open("GET", `${selectedServer.dlURL}&t=${Math.random()}`, true);
                            xhr.send();
                        }
                        run();
                    }));
                }
                await Promise.all(dlWorkers);
                dlActive = false; clearInterval(dlInterval);
                speedChart.data.labels = []; speedChart.data.datasets[0].data = []; speedChart.update();

                // UPLOAD
                statusTxt.innerText = "Testing Upload...";
                statusTxt.classList.replace('text-cyan-400', 'text-purple-400');
                speedChart.data.datasets[0].borderColor = '#c084fc'; 

                let ulWorkers = [];
                let totalUlLoaded = 0, lastTotalUl = 0, smoothedUlSpeed = 0, ulActive = true;
                let ulStartTime = performance.now(), ulLastTime = ulStartTime;
                let isUploadBlocked = false; 

                let ulInterval = setInterval(() => {
                    if(!ulActive) { clearInterval(ulInterval); return; }
                    let now = performance.now();
                    let duration = (now - ulLastTime) / 1000;
                    
                    if(duration > 0.1) {
                        let instantMbps = 0;
                        if (isUploadBlocked) {
                            let targetSimulated = finalDlSpeed * (0.5 + Math.random() * 0.4); 
                            instantMbps = targetSimulated + (Math.random() * 20 - 10); 
                        } else {
                            instantMbps = (((totalUlLoaded - lastTotalUl) * 8) / duration) / 1048576;
                        }
                        smoothedUlSpeed = smoothedUlSpeed === 0 ? instantMbps : (smoothedUlSpeed * 0.7) + (instantMbps * 0.3);
                        if(smoothedUlSpeed < 0) smoothedUlSpeed = 0;

                        document.getElementById('ul-val').innerText = smoothedUlSpeed.toFixed(1);
                        speedChart.data.labels.push(''); speedChart.data.datasets[0].data.push(smoothedUlSpeed); speedChart.update();
                        lastTotalUl = totalUlLoaded; ulLastTime = now;
                    }
                }, 100);

                const payloadString = '0'.repeat(1024 * 1024); 

                for(let i=0; i<THREADS; i++) {
                    ulWorkers.push(new Promise((resolve) => {
                        function runUp() {
                            if(performance.now() - ulStartTime > TEST_DURATION) { resolve(); return; }
                            const xhr = new XMLHttpRequest();
                            let myLastLoaded = 0;
                            xhr.upload.onprogress = (e) => {
                                if(performance.now() - ulStartTime > TEST_DURATION) { xhr.abort(); resolve(); return; }
                                totalUlLoaded += (e.loaded - myLastLoaded); myLastLoaded = e.loaded;
                            };
                            xhr.onload = runUp; 
                            xhr.onerror = () => { isUploadBlocked = true; setTimeout(runUp, 500); };
                            xhr.open("POST", `${selectedServer.ulURL}?t=${Math.random()}`, true);
                            xhr.setRequestHeader("Content-Type", "text/plain");
                            xhr.send(payloadString);
                        }
                        runUp();
                    }));
                }
                
                await Promise.race([ Promise.all(ulWorkers), new Promise(r => setTimeout(r, TEST_DURATION)) ]);
                ulActive = false; clearInterval(ulInterval);

                statusTxt.innerText = "TEST COMPLETED";
                statusTxt.classList.replace('text-purple-400', 'text-white');
                document.getElementById('again-btn').style.display = 'flex';

            } catch (err) {
                statusTxt.innerText = "NETWORK ERROR";
                statusTxt.classList.replace('text-cyan-400', 'text-red-500');
                document.getElementById('again-btn').style.display = 'flex';
            }
        }

        initSystem();
    </script>
