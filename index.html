<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BSNL Speedtest - GitHub Pages Edition</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- Leaflet CSS & JS untuk Map -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .bsnl-glow { box-shadow: 0 0 20px rgba(249, 115, 22, 0.5); }
        #map { height: 220px; border-radius: 0.75rem; z-index: 1; }
    </style>
</head>
<body class="bg-slate-900 text-white min-h-screen flex flex-col items-center py-8">

    <!-- Header BSNL -->
    <div class="text-center mb-6 w-full max-w-4xl px-4">
        <div class="flex items-center justify-center gap-3 mb-2">
            <div class="w-10 h-10 bg-blue-600 rounded-full flex items-center justify-center font-bold text-lg border-2 border-orange-500">B</div>
            <h1 class="text-3xl font-extrabold tracking-tight">
                <span class="text-blue-500">BSNL</span> <span class="text-orange-500">Speedtest</span>
            </h1>
        </div>
        <p class="text-slate-400 text-sm" id="user-location">Mendeteksi lokasi Anda...</p>
    </div>

    <!-- Main Dashboard -->
    <div class="bg-slate-800 p-6 rounded-3xl border border-slate-700 w-11/12 max-w-4xl shadow-2xl">
        
        <!-- Peta Server -->
        <div class="w-full bg-slate-900 p-2 rounded-xl mb-6 border border-slate-700 relative">
            <div id="map"></div>
            <div class="absolute bottom-4 left-4 z-[999] bg-slate-900/90 px-3 py-1.5 rounded-lg text-xs text-orange-400 font-bold border border-orange-500 shadow-lg">
                Server Publik Terdekat: <span id="target-server-name" class="text-white">Mencari...</span>
            </div>
        </div>

        <!-- Result Grid -->
        <div class="grid grid-cols-3 gap-4 text-center mb-6">
            <div class="bg-slate-900/50 p-4 rounded-2xl border-b-2 border-slate-500 shadow-inner">
                <p class="text-xs text-slate-400 uppercase tracking-widest mb-1">Ping</p>
                <h2 id="ping-val" class="text-2xl md:text-3xl font-bold">-- <span class="text-xs font-normal text-slate-500">ms</span></h2>
            </div>
            <div class="bg-slate-900/50 p-4 rounded-2xl border-b-2 border-blue-500 shadow-inner">
                <p class="text-xs text-slate-400 uppercase tracking-widest mb-1">Download</p>
                <h2 id="dl-val" class="text-2xl md:text-3xl font-bold text-blue-400">-- <span class="text-xs font-normal text-slate-500">Mbps</span></h2>
            </div>
            <div class="bg-slate-900/50 p-4 rounded-2xl border-b-2 border-orange-500 shadow-inner">
                <p class="text-xs text-slate-400 uppercase tracking-widest mb-1">Upload</p>
                <h2 id="ul-val" class="text-2xl md:text-3xl font-bold text-orange-400">-- <span class="text-xs font-normal text-slate-500">Mbps</span></h2>
            </div>
        </div>

        <!-- Chart Container -->
        <div class="w-full bg-slate-900 rounded-xl p-4 mb-6 border border-slate-700" style="height: 220px;">
            <canvas id="speedChart"></canvas>
        </div>

        <!-- Action Button -->
        <div class="flex justify-center mt-4">
            <button id="start-btn" onclick="startEngine()" disabled class="relative flex items-center justify-center w-28 h-28 rounded-full bg-slate-800 border-4 border-orange-500 text-xl font-bold text-white uppercase tracking-wider transition-all duration-300 bsnl-glow opacity-50 cursor-not-allowed">
                WAIT
            </button>
        </div>
        <p id="status-text" class="text-center text-slate-400 text-sm mt-4 h-5 font-semibold">Menunggu lokasi...</p>
    </div>

    <!-- JavaScript Logic (Frontend Only) -->
    <script>
        // --- 1. SETUP MAP & LOKASI (LEAFLET + IPAPI) ---
        // Daftar server publik virtual (hanya untuk visualisasi map & kalkulasi jarak)
        const virtualServers = [
            { name: "Singapore (Cloudflare)", lat: 1.3521, lon: 103.8198 },
            { name: "Jakarta (Edge)", lat: -6.2088, lon: 106.8456 },
            { name: "Tokyo (AWS)", lat: 35.6762, lon: 139.6503 },
            { name: "Sydney (Telstra)", lat: -33.8688, lon: 151.2093 }
        ];

        let map, userLat, userLon;

        function initMap() {
            map = L.map('map').setView([-2.5, 118], 3);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
                attribution: '&copy; OpenStreetMap'
            }).addTo(map);
        }

        function getDistance(lat1, lon1, lat2, lon2) {
            const R = 6371; // Radius bumi km
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon/2) * Math.sin(dLon/2);
            return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a))); 
        }

        async function detectLocation() {
            try {
                const res = await fetch('https://ipapi.co/json/');
                const data = await res.json();
                userLat = data.latitude;
                userLon = data.longitude;
                document.getElementById('user-location').innerText = `Provider: ${data.org} | ${data.city}, ${data.country_name}`;

                // Plot User
                L.circleMarker([userLat, userLon], { color: '#3b82f6', radius: 8, fillOpacity: 1 }).addTo(map).bindPopup("Lokasi Kamu").openPopup();

                // Cari Server Terdekat
                let closestServer = virtualServers[0];
                let minDistance = Infinity;

                virtualServers.forEach(srv => {
                    let dist = getDistance(userLat, userLon, srv.lat, srv.lon);
                    if(dist < minDistance) {
                        minDistance = dist;
                        closestServer = srv;
                    }
                });

                document.getElementById('target-server-name').innerText = `${closestServer.name} (${minDistance.toFixed(0)} km)`;
                
                // Plot Server & Tarik Garis
                L.marker([closestServer.lat, closestServer.lon]).addTo(map).bindPopup("Server Target");
                L.polyline([[userLat, userLon], [closestServer.lat, closestServer.lon]], {color: '#f97316', weight: 3, dashArray: '5, 8'}).addTo(map);
                map.fitBounds([[userLat, userLon], [closestServer.lat, closestServer.lon]], { padding: [40, 40] });

                // Aktifin Tombol GO
                const btn = document.getElementById('start-btn');
                btn.innerText = "GO";
                btn.disabled = false;
                btn.classList.remove('opacity-50', 'cursor-not-allowed');
                btn.classList.add('hover:bg-orange-600', 'hover:scale-105');
                document.getElementById('status-text').innerText = "Siap untuk test.";

            } catch (err) {
                document.getElementById('user-location').innerText = "Gagal mendeteksi lokasi (Bisa jadi terblokir AdBlocker).";
                document.getElementById('target-server-name').innerText = "Default Public Route";
                // Tetap aktifkan tombol
                const btn = document.getElementById('start-btn');
                btn.innerText = "GO";
                btn.disabled = false;
                btn.classList.remove('opacity-50', 'cursor-not-allowed');
            }
        }

        // --- 2. SETUP CHART.JS ---
        const ctx = document.getElementById('speedChart').getContext('2d');
        let speedChart = new Chart(ctx, {
            type: 'line',
            data: { labels: [], datasets: [{ label: 'Mbps', data: [], borderColor: '#3b82f6', backgroundColor: 'rgba(59, 130, 246, 0.2)', borderWidth: 3, tension: 0.4, fill: true, pointRadius: 0 }] },
            options: { responsive: true, maintainAspectRatio: false, animation: { duration: 0 }, scales: { x: { display: false }, y: { beginAtZero: true, grid: { color: '#334155' }, ticks: { color: '#94a3b8' } } }, plugins: { legend: { display: false } } }
        });

        // --- 3. LOGIKA SPEEDTEST (FRONTEND ONLY) ---
        async function startEngine() {
            const btn = document.getElementById('start-btn');
            const status = document.getElementById('status-text');
            
            // Reset UI
            btn.disabled = true;
            btn.innerText = "TEST";
            btn.classList.add('opacity-50', 'scale-95');
            document.getElementById('ping-val').innerHTML = '-- <span class="text-xs text-slate-500">ms</span>';
            document.getElementById('dl-val').innerHTML = '-- <span class="text-xs text-slate-500">Mbps</span>';
            document.getElementById('ul-val').innerHTML = '-- <span class="text-xs text-slate-500">Mbps</span>';
            speedChart.data.labels = []; speedChart.data.datasets[0].data = []; speedChart.update();

            try {
                // TEST PING
                status.innerText = "Mengukur Ping...";
                let pStart = performance.now();
                await fetch('https://api.github.com/zen', { mode: 'no-cors', cache: 'no-store' });
                let pEnd = performance.now();
                document.getElementById('ping-val').innerHTML = `${Math.round(pEnd - pStart)} <span class="text-xs text-slate-500">ms</span>`;

                // TEST DOWNLOAD (Readable Stream via Wikimedia)
                status.innerText = "Mengukur kecepatan Download...";
                speedChart.data.datasets[0].borderColor = '#3b82f6';
                speedChart.data.datasets[0].backgroundColor = 'rgba(59, 130, 246, 0.2)';
                
                const dlRes = await fetch("https://upload.wikimedia.org/wikipedia/commons/f/ff/Pizigani_1367_Chart_10MB.jpg?t=" + Date.now());
                const reader = dlRes.body.getReader();
                let dlLastTime = performance.now();

                while(true) {
                    const {done, value} = await reader.read();
                    if(done) break;
                    let now = performance.now();
                    let duration = (now - dlLastTime) / 1000;
                    
                    if(duration > 0.1) {
                        let mbps = ((value.length * 8) / duration) / (1024 * 1024);
                        speedChart.data.labels.push('');
                        speedChart.data.datasets[0].data.push(mbps);
                        speedChart.update();
                        document.getElementById('dl-val').innerHTML = `${mbps.toFixed(1)} <span class="text-xs text-slate-500">Mbps</span>`;
                        dlLastTime = now;
                    }
                }

                // Bersihin Chart buat Upload
                speedChart.data.labels = []; speedChart.data.datasets[0].data = []; speedChart.update();

                // TEST UPLOAD (XHR Progress via HTTPBin)
                status.innerText = "Mengukur kecepatan Upload...";
                speedChart.data.datasets[0].borderColor = '#f97316';
                speedChart.data.datasets[0].backgroundColor = 'rgba(249, 115, 22, 0.2)';

                await new Promise((resolve) => {
                    const xhr = new XMLHttpRequest();
                    const dummyData = new Uint8Array(2 * 1024 * 1024); // 2MB Dummy file
                    let ulLastTime = performance.now();
                    let lastLoaded = 0;

                    xhr.upload.onprogress = (e) => {
                        let now = performance.now();
                        let duration = (now - ulLastTime) / 1000;
                        if(duration > 0.1) {
                            let mbps = (((e.loaded - lastLoaded) * 8) / duration) / (1024 * 1024);
                            speedChart.data.labels.push('');
                            speedChart.data.datasets[0].data.push(mbps);
                            speedChart.update();
                            document.getElementById('ul-val').innerHTML = `${mbps.toFixed(1)} <span class="text-xs text-slate-500">Mbps</span>`;
                            ulLastTime = now;
                            lastLoaded = e.loaded;
                        }
                    };
                    xhr.onload = () => resolve();
                    xhr.open("POST", "https://httpbin.org/post", true);
                    xhr.send(dummyData);
                });

                status.innerText = "Pengujian Selesai!";
            } catch (err) {
                status.innerText = "Terjadi kesalahan jaringan.";
            } finally {
                btn.disabled = false;
                btn.classList.remove('opacity-50', 'scale-95');
                btn.innerText = "RETEST";
            }
        }

        // Jalankan pas web dibuka
        initMap();
        detectLocation();
    </script>
</body>
</html>
