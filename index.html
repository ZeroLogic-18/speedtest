<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BSNL Speedtest - Multi-Threaded Engine</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=JetBrains+Mono:wght@700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #020617; }
        .font-mono { font-family: 'JetBrains Mono', monospace; }
        .glass-panel { background: rgba(30, 41, 59, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(71, 85, 105, 0.4); }
        .bsnl-glow { box-shadow: 0 0 35px rgba(37, 99, 235, 0.6); }
        #map { height: 220px; border-radius: 0.75rem; z-index: 1; }
    </style>
</head>
<body class="text-white min-h-screen flex flex-col items-center py-6 px-4">

    <div class="text-center mb-6 w-full max-w-5xl flex flex-col md:flex-row items-center justify-between">
        <div class="flex items-center gap-3 mb-4 md:mb-0">
            <div class="w-12 h-12 bg-blue-600 rounded-lg flex items-center justify-center font-bold text-2xl shadow-[0_0_15px_rgba(37,99,235,0.8)]">B</div>
            <h1 class="text-3xl font-extrabold tracking-tight">
                <span class="text-blue-500">BSNL</span><span class="text-white font-light opacity-60 ml-2">CORE</span>
            </h1>
        </div>
        <div class="flex items-center gap-2 bg-slate-800/80 px-4 py-2 rounded-full border border-slate-700">
            <div id="status-dot" class="w-3 h-3 rounded-full bg-yellow-500 animate-pulse"></div>
            <span id="status-text" class="text-sm font-semibold text-slate-300">Menyiapkan Multi-Threading...</span>
        </div>
    </div>

    <div class="w-full max-w-5xl grid grid-cols-1 lg:grid-cols-3 gap-6">
        
        <div class="lg:col-span-1 flex flex-col gap-6">
            <div class="glass-panel p-5 rounded-2xl">
                <h3 class="text-xs text-slate-400 uppercase tracking-widest mb-3 flex items-center gap-2"><i data-lucide="activity" class="w-4 h-4"></i> Engine Specs</h3>
                <div class="space-y-3">
                    <div class="flex justify-between text-sm">
                        <span class="text-slate-400">Connection Mode</span>
                        <span class="text-blue-400 font-bold">Parallel (4 Threads)</span>
                    </div>
                    <div class="flex justify-between text-sm">
                        <span class="text-slate-400">Target Host</span>
                        <span class="text-blue-400 font-bold">Cloudflare Anycast</span>
                    </div>
                    <div class="pt-3 border-t border-slate-700/50">
                        <p class="text-lg font-bold text-white" id="client-isp">Mendeteksi ISP...</p>
                        <p class="text-xs text-slate-400 font-mono mt-1" id="client-ip">IP: --</p>
                    </div>
                </div>
            </div>

            <div class="glass-panel p-5 rounded-2xl flex-grow flex flex-col">
                <h3 class="text-xs text-slate-400 uppercase tracking-widest mb-3 flex items-center gap-2"><i data-lucide="map-pin" class="w-4 h-4"></i> Optimal Routing</h3>
                <div id="map" class="flex-grow w-full border border-slate-700 relative"></div>
            </div>
        </div>

        <div class="lg:col-span-2 flex flex-col gap-6">
            <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                <div class="glass-panel p-4 rounded-2xl flex flex-col items-center justify-center relative overflow-hidden">
                    <div class="absolute top-0 w-full h-1 bg-slate-500"></div>
                    <p class="text-xs text-slate-400 uppercase mb-1">Ping</p>
                    <h2 id="ping-val" class="text-3xl font-mono text-white">--</h2>
                    <p class="text-xs text-slate-500">ms</p>
                </div>
                <div class="glass-panel p-4 rounded-2xl flex flex-col items-center justify-center relative overflow-hidden">
                    <div class="absolute top-0 w-full h-1 bg-purple-500"></div>
                    <p class="text-xs text-slate-400 uppercase mb-1">Jitter</p>
                    <h2 id="jitter-val" class="text-3xl font-mono text-white">--</h2>
                    <p class="text-xs text-slate-500">ms</p>
                </div>
                <div class="glass-panel p-4 rounded-2xl flex flex-col items-center justify-center relative overflow-hidden bg-slate-800/50">
                    <div class="absolute top-0 w-full h-1 bg-blue-500 shadow-[0_0_10px_rgba(59,130,246,1)]"></div>
                    <p class="text-xs text-slate-400 uppercase mb-1">Download</p>
                    <h2 id="dl-val" class="text-4xl md:text-5xl font-mono text-blue-400 transition-all duration-75">--</h2>
                    <p class="text-xs text-slate-500">Mbps</p>
                </div>
                <div class="glass-panel p-4 rounded-2xl flex flex-col items-center justify-center relative overflow-hidden bg-slate-800/50">
                    <div class="absolute top-0 w-full h-1 bg-orange-500 shadow-[0_0_10px_rgba(249,115,22,1)]"></div>
                    <p class="text-xs text-slate-400 uppercase mb-1">Upload</p>
                    <h2 id="ul-val" class="text-4xl md:text-5xl font-mono text-orange-400 transition-all duration-75">--</h2>
                    <p class="text-xs text-slate-500">Mbps</p>
                </div>
            </div>

            <div class="glass-panel p-5 rounded-2xl relative" style="height: 250px;">
                <canvas id="speedChart"></canvas>
            </div>

            <div class="flex justify-center mt-4">
                <button id="start-btn" onclick="startEngine()" disabled class="relative flex items-center justify-center w-32 h-32 rounded-full bg-slate-900 border-4 border-blue-500 text-2xl font-extrabold text-white uppercase tracking-wider transition-all duration-300 bsnl-glow opacity-50 cursor-not-allowed hover:bg-blue-800 hover:scale-105 group">
                    <span class="group-hover:scale-110 transition-transform">GO</span>
                </button>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();

        // Variabel Global
        let map, userLat, userLon;
        const TEST_DURATION = 12000; 
        const THREADS = 4; // BUKA 4 KONEKSI SEKALIGUS (RAHASIA OOKLA)
        
        function initMap() {
            map = L.map('map', { zoomControl: false }).setView([-2.5, 118], 4);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);
        }

        async function detectLocation() {
            try {
                const res = await fetch('https://ipapi.co/json/');
                const data = await res.json();
                userLat = data.latitude; userLon = data.longitude;
                
                document.getElementById('client-isp').innerText = data.org || "Unknown ISP";
                document.getElementById('client-ip').innerText = `IP: ${data.ip}`;

                L.circleMarker([userLat, userLon], { color: '#3b82f6', radius: 8, fillOpacity: 0.8 }).addTo(map).bindPopup("Lokasi Anda").openPopup();
                map.setView([userLat, userLon], 5);

                setStatus("Engine Siap (4 Threads Active)", "bg-green-500", false);
            } catch (err) {
                setStatus("Mode Privat", "bg-green-500", false);
            }
        }

        function setStatus(text, colorClass, disableBtn) {
            document.getElementById('status-text').innerText = text;
            document.getElementById('status-dot').className = `w-3 h-3 rounded-full animate-pulse ${colorClass}`;
            const btn = document.getElementById('start-btn');
            btn.disabled = disableBtn;
            if(!disableBtn) {
                btn.classList.remove('opacity-50', 'cursor-not-allowed');
                btn.classList.add('bsnl-glow');
            }
        }

        // Setup Grafik
        const ctx = document.getElementById('speedChart').getContext('2d');
        let speedChart = new Chart(ctx, {
            type: 'line',
            data: { labels: [], datasets: [{ data: [], borderColor: '#3b82f6', backgroundColor: 'rgba(59, 130, 246, 0.2)', borderWidth: 3, tension: 0.4, fill: true, pointRadius: 0 }] },
            options: { responsive: true, maintainAspectRatio: false, animation: { duration: 150 }, scales: { x: { display: false }, y: { beginAtZero: true, grid: { color: '#1e293b' }, ticks: { color: '#64748b' } } }, plugins: { legend: { display: false } } }
        });

        // ==========================================
        // MULTI-THREADED SPEEDTEST ENGINE
        // ==========================================
        async function startEngine() {
            const btn = document.getElementById('start-btn');
            setStatus("Menguji Koneksi...", "bg-blue-500", true);
            btn.classList.add('scale-95', 'opacity-80', 'border-slate-500');
            btn.innerText = "WAIT";
            
            ['ping-val', 'jitter-val', 'dl-val', 'ul-val'].forEach(id => document.getElementById(id).innerText = '--');
            speedChart.data.labels = []; speedChart.data.datasets[0].data = []; speedChart.update();

            try {
                // 1. PING & JITTER
                let pings = [];
                for(let i=0; i<5; i++) {
                    let pStart = performance.now();
                    await fetch('https://speed.cloudflare.com/__down?bytes=0', { cache: 'no-store' });
                    pings.push(performance.now() - pStart);
                }
                let avgPing = pings.reduce((a,b)=>a+b,0) / pings.length;
                let jitter = Math.max(...pings) - Math.min(...pings);
                document.getElementById('ping-val').innerText = Math.round(avgPing);
                document.getElementById('jitter-val').innerText = Math.round(jitter);

                // ======================================
                // 2. PARALLEL DOWNLOAD TEST (4 Jalur)
                // ======================================
                setStatus("Mengukur Download (Parallel)...", "bg-blue-500", true);
                speedChart.data.datasets[0].borderColor = '#3b82f6';
                speedChart.data.datasets[0].backgroundColor = 'rgba(59, 130, 246, 0.2)';
                
                let dlWorkers = [];
                let totalDlLoaded = 0;
                let lastTotalDl = 0;
                let smoothedDlSpeed = 0;
                let dlActive = true;
                
                let dlStartTime = performance.now();
                let dlLastTime = dlStartTime;

                // Fungsi hitung kecepatan gabungan dari 4 jalur
                let dlInterval = setInterval(() => {
                    if(!dlActive) { clearInterval(dlInterval); return; }
                    let now = performance.now();
                    let duration = (now - dlLastTime) / 1000;
                    
                    if(duration > 0.1) {
                        let currentBits = (totalDlLoaded - lastTotalDl) * 8;
                        let instantMbps = (currentBits / duration) / (1024 * 1024);
                        
                        // EMA Smoothing biar naik turunnya enak diliat
                        if (smoothedDlSpeed === 0) smoothedDlSpeed = instantMbps;
                        else smoothedDlSpeed = (smoothedDlSpeed * 0.7) + (instantMbps * 0.3);

                        document.getElementById('dl-val').innerText = smoothedDlSpeed.toFixed(1);
                        speedChart.data.labels.push('');
                        speedChart.data.datasets[0].data.push(smoothedDlSpeed);
                        speedChart.update();
                        
                        lastTotalDl = totalDlLoaded;
                        dlLastTime = now;
                    }
                }, 100);

                // Nyalain 4 Thread XHR Download barengan
                for(let i=0; i<THREADS; i++) {
                    dlWorkers.push(new Promise((resolve) => {
                        const xhr = new XMLHttpRequest();
                        let myLastLoaded = 0;
                        xhr.onprogress = (e) => {
                            if(performance.now() - dlStartTime > TEST_DURATION) { xhr.abort(); resolve(); }
                            let delta = e.loaded - myLastLoaded;
                            totalDlLoaded += delta;
                            myLastLoaded = e.loaded;
                        };
                        xhr.onload = () => resolve();
                        xhr.onerror = () => resolve();
                        // Tiap jalur tarik 25MB (total 100MB ditarik berbarengan)
                        xhr.open("GET", `https://speed.cloudflare.com/__down?bytes=25000000&t=${Math.random()}`, true);
                        xhr.send();
                    }));
                }

                // Tunggu sampai semua thread kelar atau waktu habis
                await Promise.all(dlWorkers);
                dlActive = false;
                clearInterval(dlInterval);

                // Reset Chart
                speedChart.data.labels = []; speedChart.data.datasets[0].data = []; speedChart.update();

                // ======================================
                // 3. PARALLEL UPLOAD TEST (4 Jalur)
                // ======================================
                setStatus("Mengukur Upload (Parallel)...", "bg-orange-500", true);
                document.querySelector('#start-btn').classList.replace('border-blue-500', 'border-orange-500');
                speedChart.data.datasets[0].borderColor = '#f97316';
                speedChart.data.datasets[0].backgroundColor = 'rgba(249, 115, 22, 0.2)';

                let ulWorkers = [];
                let totalUlLoaded = 0;
                let lastTotalUl = 0;
                let smoothedUlSpeed = 0;
                let ulActive = true;
                
                let ulStartTime = performance.now();
                let ulLastTime = ulStartTime;

                let ulInterval = setInterval(() => {
                    if(!ulActive) { clearInterval(ulInterval); return; }
                    let now = performance.now();
                    let duration = (now - ulLastTime) / 1000;
                    
                    if(duration > 0.1) {
                        let currentBits = (totalUlLoaded - lastTotalUl) * 8;
                        let instantMbps = (currentBits / duration) / (1024 * 1024);
                        
                        if (smoothedUlSpeed === 0) smoothedUlSpeed = instantMbps;
                        else smoothedUlSpeed = (smoothedUlSpeed * 0.7) + (instantMbps * 0.3);

                        document.getElementById('ul-val').innerText = smoothedUlSpeed.toFixed(1);
                        speedChart.data.labels.push('');
                        speedChart.data.datasets[0].data.push(smoothedUlSpeed);
                        speedChart.update();
                        
                        lastTotalUl = totalUlLoaded;
                        ulLastTime = now;
                    }
                }, 100);

                // Bikin data dummy 5MB buat diupload
                const dummyData = new Uint8Array(5 * 1024 * 1024);

                // Nyalain 4 Thread XHR Upload barengan
                for(let i=0; i<THREADS; i++) {
                    ulWorkers.push(new Promise((resolve) => {
                        const xhr = new XMLHttpRequest();
                        let myLastLoaded = 0;
                        xhr.upload.onprogress = (e) => {
                            if(performance.now() - ulStartTime > TEST_DURATION) { xhr.abort(); resolve(); }
                            let delta = e.loaded - myLastLoaded;
                            totalUlLoaded += delta;
                            myLastLoaded = e.loaded;
                        };
                        xhr.onload = () => resolve();
                        xhr.onerror = () => resolve();
                        xhr.open("POST", `https://speed.cloudflare.com/__up?t=${Math.random()}`, true);
                        xhr.send(dummyData);
                    }));
                }

                await Promise.all(ulWorkers);
                ulActive = false;
                clearInterval(ulInterval);

                setStatus("Pengujian Selesai!", "bg-green-500", false);
            } catch (err) {
                setStatus("Gagal. Coba Lagi.", "bg-red-500", false);
            } finally {
                btn.classList.remove('scale-95', 'opacity-80', 'border-slate-500', 'border-orange-500');
                btn.classList.add('border-blue-500');
                btn.innerText = "AGAIN";
            }
        }

        initMap();
        detectLocation();
    </script>
</body>
</html>
