<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BSNL Speedtest - Multi-Server Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=JetBrains+Mono:wght@700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #020617; }
        .font-mono { font-family: 'JetBrains Mono', monospace; }
        .glass-panel { background: rgba(30, 41, 59, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(71, 85, 105, 0.4); }
        .bsnl-glow { box-shadow: 0 0 35px rgba(37, 99, 235, 0.6); }
        #map { height: 250px; border-radius: 0.75rem; z-index: 1; }
        
        /* Styling Dropdown biar elegan */
        select { appearance: none; background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%233b82f6' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e"); background-repeat: no-repeat; background-position: right 1rem center; background-size: 1em; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #3b82f6; border-radius: 4px; }
    </style>
</head>
<body class="text-white min-h-screen flex flex-col items-center py-6 px-4">

    <div class="text-center mb-6 w-full max-w-6xl flex flex-col md:flex-row items-center justify-between">
        <div class="flex items-center gap-3 mb-4 md:mb-0">
            <div class="w-12 h-12 bg-blue-600 rounded-lg flex items-center justify-center font-bold text-2xl shadow-[0_0_15px_rgba(37,99,235,0.8)]">B</div>
            <h1 class="text-3xl font-extrabold tracking-tight">
                <span class="text-blue-500">BSNL</span><span class="text-white font-light opacity-60 ml-2">SPEEDTEST</span>
            </h1>
        </div>
        <div class="flex items-center gap-2 bg-slate-800/80 px-4 py-2 rounded-full border border-slate-700 shadow-lg">
            <div id="status-dot" class="w-3 h-3 rounded-full bg-yellow-500 animate-pulse"></div>
            <span id="status-text" class="text-sm font-semibold text-slate-300">Menyiapkan GPS & Server...</span>
        </div>
    </div>

    <div class="w-full max-w-6xl grid grid-cols-1 xl:grid-cols-3 gap-6">
        
        <div class="xl:col-span-1 flex flex-col gap-6">
            
            <div class="glass-panel p-5 rounded-2xl">
                <h3 class="text-xs text-slate-400 uppercase tracking-widest mb-3 flex items-center gap-2"><i data-lucide="user" class="w-4 h-4"></i> Client Info</h3>
                <div class="pt-2 border-t border-slate-700/50">
                    <p class="text-lg font-bold text-blue-400" id="client-isp">Mendeteksi ISP...</p>
                    <p class="text-xs text-slate-400 font-mono mt-1" id="client-ip">IP: --</p>
                    <p class="text-xs text-green-400 font-bold mt-2" id="gps-status">Akurasi Map: Menunggu...</p>
                </div>
            </div>

            <div class="glass-panel p-5 rounded-2xl flex-grow flex flex-col">
                <h3 class="text-xs text-slate-400 uppercase tracking-widest mb-3 flex items-center gap-2"><i data-lucide="server" class="w-4 h-4"></i> Target Server</h3>
                
                <div class="relative mb-4">
                    <select id="server-select" onchange="changeServer()" class="w-full bg-slate-900 border border-blue-500/50 text-sm font-semibold text-white rounded-xl p-3.5 pr-10 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none cursor-pointer shadow-lg transition-all">
                        <option value="">Mencari server terdekat...</option>
                    </select>
                </div>

                <div id="map" class="w-full border border-slate-700 relative shadow-inner"></div>
            </div>
        </div>

        <div class="xl:col-span-2 flex flex-col gap-6">
            
            <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                <div class="glass-panel p-4 rounded-2xl flex flex-col items-center justify-center relative overflow-hidden">
                    <div class="absolute top-0 w-full h-1 bg-slate-500"></div>
                    <p class="text-xs text-slate-400 uppercase tracking-widest mb-1">Ping</p>
                    <h2 id="ping-val" class="text-3xl md:text-4xl font-mono text-white">--</h2>
                    <p class="text-xs text-slate-500">ms</p>
                </div>
                <div class="glass-panel p-4 rounded-2xl flex flex-col items-center justify-center relative overflow-hidden">
                    <div class="absolute top-0 w-full h-1 bg-purple-500"></div>
                    <p class="text-xs text-slate-400 uppercase tracking-widest mb-1">Jitter</p>
                    <h2 id="jitter-val" class="text-3xl md:text-4xl font-mono text-white">--</h2>
                    <p class="text-xs text-slate-500">ms</p>
                </div>
                <div class="glass-panel p-4 rounded-2xl flex flex-col items-center justify-center relative overflow-hidden bg-slate-800/60 shadow-[0_0_15px_rgba(59,130,246,0.1)]">
                    <div class="absolute top-0 w-full h-1.5 bg-blue-500 shadow-[0_0_15px_rgba(59,130,246,1)]"></div>
                    <p class="text-xs text-slate-400 uppercase tracking-widest mb-1">Download</p>
                    <h2 id="dl-val" class="text-5xl md:text-6xl font-mono text-blue-400 transition-all duration-75">--</h2>
                    <p class="text-xs text-slate-500 mt-1">Mbps</p>
                </div>
                <div class="glass-panel p-4 rounded-2xl flex flex-col items-center justify-center relative overflow-hidden bg-slate-800/60 shadow-[0_0_15px_rgba(249,115,22,0.1)]">
                    <div class="absolute top-0 w-full h-1.5 bg-orange-500 shadow-[0_0_15px_rgba(249,115,22,1)]"></div>
                    <p class="text-xs text-slate-400 uppercase tracking-widest mb-1">Upload</p>
                    <h2 id="ul-val" class="text-5xl md:text-6xl font-mono text-orange-400 transition-all duration-75">--</h2>
                    <p class="text-xs text-slate-500 mt-1">Mbps</p>
                </div>
            </div>

            <div class="glass-panel p-5 rounded-2xl relative flex-grow min-h-[250px]">
                <canvas id="speedChart"></canvas>
            </div>

            <div class="flex justify-center mt-2">
                <button id="start-btn" onclick="startEngine()" disabled class="relative flex items-center justify-center w-36 h-36 rounded-full bg-slate-900 border-[5px] border-blue-500 text-3xl font-extrabold text-white uppercase tracking-wider transition-all duration-300 bsnl-glow opacity-50 cursor-not-allowed hover:bg-blue-800 hover:scale-105 group shadow-2xl">
                    <span class="group-hover:scale-110 transition-transform">GO</span>
                </button>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();

        // ==========================================
        // 1. DATABASE SERVER ISP (BISA LU TAMBAH SENDIRI)
        // ==========================================
        const serverDatabase = [
            { id: 1, name: "Jakarta (Telkom Indonesia)", lat: -6.2088, lon: 106.8456, dlURL: "https://speed.cloudflare.com/__down?bytes=25000000", ulURL: "https://speed.cloudflare.com/__up" },
            { id: 2, name: "Jakarta (Biznet Networks)", lat: -6.2200, lon: 106.8300, dlURL: "https://speed.cloudflare.com/__down?bytes=25000000", ulURL: "https://speed.cloudflare.com/__up" },
            { id: 3, name: "Surabaya (Indosat Ooredoo)", lat: -7.2504, lon: 112.7688, dlURL: "https://speed.cloudflare.com/__down?bytes=25000000", ulURL: "https://speed.cloudflare.com/__up" },
            { id: 4, name: "Singapore (Singtel Global)", lat: 1.3521, lon: 103.8198, dlURL: "https://speed.cloudflare.com/__down?bytes=25000000", ulURL: "https://speed.cloudflare.com/__up" },
            { id: 5, name: "Singapore (Cloudflare Edge)", lat: 1.2800, lon: 103.8500, dlURL: "https://speed.cloudflare.com/__down?bytes=25000000", ulURL: "https://speed.cloudflare.com/__up" },
            { id: 6, name: "Tokyo (AWS AP-Northeast)", lat: 35.6762, lon: 139.6503, dlURL: "https://speed.cloudflare.com/__down?bytes=25000000", ulURL: "https://speed.cloudflare.com/__up" }
        ];

        let map, userLat, userLon, currentRouteLine, currentServerMarker;
        let selectedServer = null;
        const TEST_DURATION = 12000; 
        const THREADS = 4; // Multi-threading aktif
        
        // ==========================================
        // 2. SETUP MAP & LOKASI
        // ==========================================
        function initMap() {
            map = L.map('map', { zoomControl: false }).setView([-2.5, 118], 4);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);
        }

        // Rumus Hitung Jarak Kilometer
        function getDistanceKm(lat1, lon1, lat2, lon2) {
            const R = 6371; 
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon/2) * Math.sin(dLon/2);
            return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a))); 
        }

        async function setupLocation() {
            try {
                // 1. Ambil IP dulu buat fallback
                const traceRes = await fetch('https://cloudflare.com/cdn-cgi/trace');
                const traceText = await traceRes.text();
                const userIp = (traceText.match(/ip=(.*)/) || [])[1] || 'Unknown';
                document.getElementById('client-ip').innerText = `IP: ${userIp}`;

                const locRes = await fetch(`https://ipapi.co/${userIp}/json/`);
                const data = await locRes.json();
                document.getElementById('client-isp').innerText = data.org || "Network Terdeteksi";
                
                // 2. Tembak GPS (Kalo user ngizinin)
                if ("geolocation" in navigator) {
                    navigator.geolocation.getCurrentPosition(
                        (position) => {
                            userLat = position.coords.latitude; userLon = position.coords.longitude;
                            document.getElementById('gps-status').innerText = "Akurasi: GPS Satelit (Tinggi)";
                            document.getElementById('gps-status').className = "text-xs text-green-400 font-bold mt-2";
                            processServerList();
                        },
                        (error) => {
                            userLat = data.latitude || -6.2088; userLon = data.longitude || 106.8456;
                            document.getElementById('gps-status').innerText = "Akurasi: IP Tracker (Rendah)";
                            document.getElementById('gps-status').className = "text-xs text-yellow-400 font-bold mt-2";
                            processServerList();
                        }, { enableHighAccuracy: true, timeout: 5000 }
                    );
                } else {
                    userLat = data.latitude; userLon = data.longitude;
                    processServerList();
                }
            } catch (e) {
                userLat = -6.2088; userLon = 106.8456; // Fallback darurat ke Jakarta
                processServerList();
            }
        }

        // ==========================================
        // 3. LOGIKA DROPDOWN SERVER & MAP ROUTING
        // ==========================================
        function processServerList() {
            // Plot lokasi user pake buletan biru
            L.circleMarker([userLat, userLon], { color: '#3b82f6', radius: 7, fillOpacity: 1 }).addTo(map).bindPopup("Lokasi Kamu").openPopup();

            // Hitung jarak dari lokasi user ke semua server di database
            serverDatabase.forEach(srv => {
                srv.distance = getDistanceKm(userLat, userLon, srv.lat, srv.lon);
            });

            // Urutin dari yang paling deket jarak kilometernya
            serverDatabase.sort((a, b) => a.distance - b.distance);

            // Masukin ke Dropdown HTML
            const selectBox = document.getElementById('server-select');
            selectBox.innerHTML = "";
            serverDatabase.forEach(srv => {
                let opt = document.createElement('option');
                opt.value = srv.id;
                opt.text = `${srv.name} (Jarak: ~${srv.distance.toFixed(0)} km)`;
                selectBox.appendChild(opt);
            });

            // Otomatis pilih server paling atas (paling deket)
            selectedServer = serverDatabase[0];
            drawMapRoute(selectedServer);
            
            setStatus("Engine Siap", "bg-green-500", false);
        }

        // Fungsi kalo dropdown diganti manual sama User
        function changeServer() {
            const val = document.getElementById('server-select').value;
            selectedServer = serverDatabase.find(s => s.id == val);
            if(selectedServer) drawMapRoute(selectedServer);
        }

        // Animasi Tarik Garis Map (User ke Server)
        function drawMapRoute(srv) {
            // Hapus garis & pin server lama kalo ada
            if(currentRouteLine) map.removeLayer(currentRouteLine);
            if(currentServerMarker) map.removeLayer(currentServerMarker);
            
            // Bikin pin server baru
            currentServerMarker = L.marker([srv.lat, srv.lon]).addTo(map).bindPopup(srv.name);
            
            // Tarik garis animasi
            currentRouteLine = L.polyline([[userLat, userLon], [srv.lat, srv.lon]], {
                color: '#f97316', weight: 3, dashArray: '8, 10'
            }).addTo(map);
            
            // Auto-zoom map biar garisnya pas di tengah layar
            map.fitBounds([[userLat, userLon], [srv.lat, srv.lon]], { padding: [40, 40] });
        }

        function setStatus(text, colorClass, disableBtn) {
            document.getElementById('status-text').innerText = text;
            document.getElementById('status-dot').className = `w-3 h-3 rounded-full animate-pulse ${colorClass}`;
            const btn = document.getElementById('start-btn');
            btn.disabled = disableBtn;
            if(!disableBtn) {
                btn.classList.remove('opacity-50', 'cursor-not-allowed');
                btn.classList.add('bsnl-glow');
            }
        }

        // ==========================================
        // 4. CHART.JS & CORE SPEED ENGINE
        // ==========================================
        const ctx = document.getElementById('speedChart').getContext('2d');
        let speedChart = new Chart(ctx, {
            type: 'line',
            data: { labels: [], datasets: [{ data: [], borderColor: '#3b82f6', backgroundColor: 'rgba(59, 130, 246, 0.2)', borderWidth: 3, tension: 0.4, fill: true, pointRadius: 0 }] },
            options: { responsive: true, maintainAspectRatio: false, animation: { duration: 150 }, scales: { x: { display: false }, y: { beginAtZero: true, grid: { color: '#1e293b' }, ticks: { color: '#64748b' } } }, plugins: { legend: { display: false } } }
        });

        async function startEngine() {
            const btn = document.getElementById('start-btn');
            // Kunci dropdown pas lagi test biar ga error
            document.getElementById('server-select').disabled = true;
            
            setStatus(`Test ke: ${selectedServer.name}...`, "bg-blue-500", true);
            btn.classList.add('scale-95', 'opacity-80', 'border-slate-500');
            btn.innerText = "WAIT";
            
            ['ping-val', 'jitter-val', 'dl-val', 'ul-val'].forEach(id => document.getElementById(id).innerText = '--');
            speedChart.data.labels = []; speedChart.data.datasets[0].data = []; speedChart.update();

            try {
                // 1. PING & JITTER
                let pings = [];
                for(let i=0; i<5; i++) {
                    let pStart = performance.now();
                    // Nembak ke URL server yg dipilih
                    await fetch(`${selectedServer.dlURL.split('?')[0]}?bytes=0&t=${Math.random()}`, { cache: 'no-store' });
                    pings.push(performance.now() - pStart);
                }
                document.getElementById('ping-val').innerText = Math.round(pings.reduce((a,b)=>a+b,0) / pings.length);
                document.getElementById('jitter-val').innerText = Math.round(Math.max(...pings) - Math.min(...pings));

                // 2. DOWNLOAD (Menggunakan URL Target dari Array)
                setStatus("Mengukur Download...", "bg-blue-500", true);
                speedChart.data.datasets[0].borderColor = '#3b82f6';
                speedChart.data.datasets[0].backgroundColor = 'rgba(59, 130, 246, 0.2)';
                
                let dlWorkers = [];
                let totalDlLoaded = 0, lastTotalDl = 0, smoothedDlSpeed = 0, dlActive = true;
                let dlStartTime = performance.now(), dlLastTime = dlStartTime;

                let dlInterval = setInterval(() => {
                    if(!dlActive) { clearInterval(dlInterval); return; }
                    let now = performance.now();
                    let duration = (now - dlLastTime) / 1000;
                    if(duration > 0.1) {
                        let instantMbps = (((totalDlLoaded - lastTotalDl) * 8) / duration) / 1048576;
                        smoothedDlSpeed = smoothedDlSpeed === 0 ? instantMbps : (smoothedDlSpeed * 0.7) + (instantMbps * 0.3);
                        document.getElementById('dl-val').innerText = smoothedDlSpeed.toFixed(1);
                        speedChart.data.labels.push(''); speedChart.data.datasets[0].data.push(smoothedDlSpeed); speedChart.update();
                        lastTotalDl = totalDlLoaded; dlLastTime = now;
                    }
                }, 100);

                for(let i=0; i<THREADS; i++) {
                    dlWorkers.push(new Promise((resolve) => {
                        function run() {
                            if(performance.now() - dlStartTime > TEST_DURATION) { resolve(); return; }
                            const xhr = new XMLHttpRequest();
                            let myLastLoaded = 0;
                            xhr.onprogress = (e) => {
                                if(performance.now() - dlStartTime > TEST_DURATION) { xhr.abort(); resolve(); return; }
                                totalDlLoaded += (e.loaded - myLastLoaded); myLastLoaded = e.loaded;
                            };
                            xhr.onload = run; xhr.onerror = run;
                            // Nembak ke URL server target yg dipilih
                            xhr.open("GET", `${selectedServer.dlURL}&t=${Math.random()}`, true);
                            xhr.send();
                        }
                        run();
                    }));
                }
                await Promise.all(dlWorkers);
                dlActive = false; clearInterval(dlInterval);
                speedChart.data.labels = []; speedChart.data.datasets[0].data = []; speedChart.update();

                // 3. UPLOAD (Menggunakan URL Target dari Array)
                setStatus("Mengukur Upload...", "bg-orange-500", true);
                document.querySelector('#start-btn').classList.replace('border-blue-500', 'border-orange-500');
                speedChart.data.datasets[0].borderColor = '#f97316';
                speedChart.data.datasets[0].backgroundColor = 'rgba(249, 115, 22, 0.2)';

                let ulWorkers = [];
                let totalUlLoaded = 0, lastTotalUl = 0, smoothedUlSpeed = 0, ulActive = true;
                let ulStartTime = performance.now(), ulLastTime = ulStartTime;

                let ulInterval = setInterval(() => {
                    if(!ulActive) { clearInterval(ulInterval); return; }
                    let now = performance.now();
                    let duration = (now - ulLastTime) / 1000;
                    if(duration > 0.1) {
                        let instantMbps = (((totalUlLoaded - lastTotalUl) * 8) / duration) / 1048576;
                        smoothedUlSpeed = smoothedUlSpeed === 0 ? instantMbps : (smoothedUlSpeed * 0.7) + (instantMbps * 0.3);
                        document.getElementById('ul-val').innerText = smoothedUlSpeed.toFixed(1);
                        speedChart.data.labels.push(''); speedChart.data.datasets[0].data.push(smoothedUlSpeed); speedChart.update();
                        lastTotalUl = totalUlLoaded; ulLastTime = now;
                    }
                }, 100);

                const payloadBlob = new Blob([new Uint8Array(5 * 1024 * 1024)]); 

                for(let i=0; i<THREADS; i++) {
                    ulWorkers.push(new Promise((resolve) => {
                        function runUp() {
                            if(performance.now() - ulStartTime > TEST_DURATION) { resolve(); return; }
                            const xhr = new XMLHttpRequest();
                            let myLastLoaded = 0;
                            xhr.upload.onprogress = (e) => {
                                if(performance.now() - ulStartTime > TEST_DURATION) { xhr.abort(); resolve(); return; }
                                totalUlLoaded += (e.loaded - myLastLoaded); myLastLoaded = e.loaded;
                            };
                            xhr.onload = runUp; xhr.onerror = runUp;
                            xhr.open("POST", `${selectedServer.ulURL}?t=${Math.random()}`, true);
                            xhr.send(payloadBlob);
                        }
                        runUp();
                    }));
                }
                await Promise.all(ulWorkers);
                ulActive = false; clearInterval(ulInterval);

                setStatus("Pengujian Selesai!", "bg-green-500", false);
            } catch (err) {
                setStatus("Terjadi Kesalahan Jaringan", "bg-red-500", false);
            } finally {
                btn.classList.remove('scale-95', 'opacity-80', 'border-slate-500', 'border-orange-500');
                btn.classList.add('border-blue-500');
                btn.innerText = "AGAIN";
                document.getElementById('server-select').disabled = false; // Buka kunci dropdown
            }
        }

        initMap();
        setupLocation();
    </script>
</body>
</html>
