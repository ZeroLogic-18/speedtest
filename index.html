        let selectedServer = null;
        let finalDlSpeed = 0; 
        const TEST_DURATION = 12000;

        function initMap() {
            // Fokus map di zoom ke tengah wilayah Indonesia
            map = L.map('map', { zoomControl: false }).setView([-2.5, 118], 5);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);
        }

        function getDistanceKm(lat1, lon1, lat2, lon2) {
            const R = 6371; 
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon/2) * Math.sin(dLon/2);
            return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a))); 
        }

        // ==========================================
        // AUTO-DETECT LOCATION
        // ==========================================
        async function setupLocation() {
            let ispName = "ISP Backbone / RT-RW Net";
            let defaultLat = -6.2088; 
            let defaultLon = 106.8456;

            try {
                const traceRes = await fetch('https://cloudflare.com/cdn-cgi/trace');
                const traceText = await traceRes.text();
                const userIp = (traceText.match(/ip=(.*)/) || [])[1] || 'Unknown';
                document.getElementById('client-ip').innerText = `IP: ${userIp}`;

                const locRes = await fetch(`http://ip-api.com/json/${userIp}`);
                const data = await locRes.json();
                if(data.status === "success") {
                    ispName = data.isp.length > 25 ? data.isp.substring(0, 25) + '...' : data.isp;
                    defaultLat = data.lat; defaultLon = data.lon;
                }
                document.getElementById('client-isp').innerText = ispName;
            } catch(e) {
                document.getElementById('client-isp').innerText = "Jaringan Privat / VPN";
            }

            if ("geolocation" in navigator) {
                navigator.geolocation.getCurrentPosition(
                    (position) => {
                        userLat = position.coords.latitude; userLon = position.coords.longitude;
                        document.getElementById('gps-status').innerText = "Akurasi: Satelit GPS";
                        document.getElementById('gps-status').className = "text-xs text-green-400 font-bold mt-2";
                        processServerList();
                    },
                    (error) => {
                        userLat = defaultLat; userLon = defaultLon;
                        document.getElementById('gps-status').innerText = "Akurasi: Tracker IP";
                        document.getElementById('gps-status').className = "text-xs text-yellow-400 font-bold mt-2";
                        processServerList();
                    }, { enableHighAccuracy: true, timeout: 3000 }
                );
            } else {
                userLat = defaultLat; userLon = defaultLon;
                document.getElementById('gps-status').innerText = "Akurasi: Basic IP";
                processServerList();
            }
        }

        function processServerList() {
            L.circleMarker([userLat, userLon], { color: '#3b82f6', radius: 7, fillOpacity: 1 }).addTo(map).bindPopup("Lokasi Kamu").openPopup();

            serverDatabase.forEach(srv => { srv.distance = getDistanceKm(userLat, userLon, srv.lat, srv.lon); });
            serverDatabase.sort((a, b) => a.distance - b.distance);

            const selectBox = document.getElementById('server-select');
            selectBox.innerHTML = "";
            serverDatabase.forEach(srv => {
                let opt = document.createElement('option');
                opt.value = srv.id;
                opt.text = `${srv.name} (~${srv.distance.toFixed(0)} km)`;
                selectBox.appendChild(opt);
            });

            selectedServer = serverDatabase[0];
            drawMapRoute(selectedServer);
            setStatus("Sistem Siap!", "bg-green-500", false);
        }

        function changeServer() {
            const val = document.getElementById('server-select').value;
            selectedServer = serverDatabase.find(s => s.id == val);
            if(selectedServer) drawMapRoute(selectedServer);
        }

        function drawMapRoute(srv) {
            if(currentRouteLine) map.removeLayer(currentRouteLine);
            if(currentServerMarker) map.removeLayer(currentServerMarker);
            
            currentServerMarker = L.marker([srv.lat, srv.lon]).addTo(map).bindPopup(srv.name);
            currentRouteLine = L.polyline([[userLat, userLon], [srv.lat, srv.lon]], {
                color: '#f97316', weight: 3, dashArray: '8, 10'
            }).addTo(map);
            map.fitBounds([[userLat, userLon], [srv.lat, srv.lon]], { padding: [40, 40] });
        }

        function setStatus(text, colorClass, disableBtn) {
            document.getElementById('status-text').innerText = text;
            document.getElementById('status-dot').className = `w-3 h-3 rounded-full animate-pulse ${colorClass}`;
            const btn = document.getElementById('start-btn');
            btn.disabled = disableBtn;
            if(!disableBtn) {
                btn.classList.remove('opacity-50', 'cursor-not-allowed');
                btn.classList.add('bsnl-glow');
            }

            type: 'line',
            data: { labels: [], datasets: [{ data: [], borderColor: '#3b82f6', backgroundColor: 'rgba(59, 130, 246, 0.2)', borderWidth: 3, tension: 0.4, fill: true, pointRadius: 0 }] },
            options: { responsive: true, maintainAspectRatio: false, animation: { duration: 150 }, scales: { x: { display: false }, y: { beginAtZero: true, grid: { color: '#1e293b' }, ticks: { color: '#64748b' } } }, plugins: { legend: { display: false } } }
        });

        async function startEngine() {
            const btn = document.getElementById('start-btn');
            document.getElementById('server-select').disabled = true;
            
            setStatus(`Test Target: ${selectedServer.name}`, "bg-blue-500", true);
            btn.classList.add('scale-95', 'opacity-80', 'border-slate-500');
            btn.innerText = "WAIT";
            
            ['ping-val', 'jitter-val', 'dl-val', 'ul-val'].forEach(id => document.getElementById(id).innerText = '--');
            speedChart.data.labels = []; speedChart.data.datasets[0].data = []; speedChart.update();
            finalDlSpeed = 0;

            try {
                // 1. PING & JITTER
                let pings = [];
                for(let i=0; i<5; i++) {
                    let pStart = performance.now();
                    await fetch(`${selectedServer.dlURL.split('?')[0]}?bytes=0&t=${Math.random()}`, { cache: 'no-store' });
                    pings.push(performance.now() - pStart);
                }
                document.getElementById('ping-val').innerText = Math.round(pings.reduce((a,b)=>a+b,0) / pings.length);
                document.getElementById('jitter-val').innerText = Math.round(Math.max(...pings) - Math.min(...pings));

                // 2. DOWNLOAD
                setStatus("Mengukur Download...", "bg-blue-500", true);
                speedChart.data.datasets[0].borderColor = '#3b82f6';
                speedChart.data.datasets[0].backgroundColor = 'rgba(59, 130, 246, 0.2)';
                
                let dlWorkers = [];
                let totalDlLoaded = 0, lastTotalDl = 0, smoothedDlSpeed = 0, dlActive = true;
                let dlStartTime = performance.now(), dlLastTime = dlStartTime;

                let dlInterval = setInterval(() => {
                    if(!dlActive) { clearInterval(dlInterval); return; }
                    let now = performance.now();
                    let duration = (now - dlLastTime) / 1000;
                    if(duration > 0.1) {
                        let instantMbps = (((totalDlLoaded - lastTotalDl) * 8) / duration) / 1048576;
                        smoothedDlSpeed = smoothedDlSpeed === 0 ? instantMbps : (smoothedDlSpeed * 0.7) + (instantMbps * 0.3);
                        document.getElementById('dl-val').innerText = smoothedDlSpeed.toFixed(1);
                        finalDlSpeed = smoothedDlSpeed; 
                        speedChart.data.labels.push(''); speedChart.data.datasets[0].data.push(smoothedDlSpeed); speedChart.update();
                        lastTotalDl = totalDlLoaded; dlLastTime = now;
                    }
                }, 100);

                for(let i=0; i<THREADS; i++) {
                    dlWorkers.push(new Promise((resolve) => {
                        function run() {
                            if(performance.now() - dlStartTime > TEST_DURATION) { resolve(); return; }
                            const xhr = new XMLHttpRequest();
                            let myLastLoaded = 0;
                            xhr.onprogress = (e) => {
                                if(performance.now() - dlStartTime > TEST_DURATION) { xhr.abort(); resolve(); return; }
                                totalDlLoaded += (e.loaded - myLastLoaded); myLastLoaded = e.loaded;
                            };
                            xhr.onload = run; xhr.onerror = run;
                            xhr.open("GET", `${selectedServer.dlURL}&t=${Math.random()}`, true);
                            xhr.send();
                        }
                        run();
                    }));
                }
                await Promise.all(dlWorkers);
                dlActive = false; clearInterval(dlInterval);
                speedChart.data.labels = []; speedChart.data.datasets[0].data = []; speedChart.update();

                // 3. UPLOAD (Hybrid Engine)
                setStatus("Mengukur Upload...", "bg-orange-500", true);
                document.querySelector('#start-btn').classList.replace('border-blue-500', 'border-orange-500');
                speedChart.data.datasets[0].borderColor = '#f97316';
                speedChart.data.datasets[0].backgroundColor = 'rgba(249, 115, 22, 0.2)';

                let ulWorkers = [];
                let totalUlLoaded = 0, lastTotalUl = 0, smoothedUlSpeed = 0, ulActive = true;
                let ulStartTime = performance.now(), ulLastTime = ulStartTime;
                let isUploadBlocked = false; 

                let ulInterval = setInterval(() => {
                    if(!ulActive) { clearInterval(ulInterval); return; }
                    let now = performance.now();
                    let duration = (now - ulLastTime) / 1000;
                    
                    if(duration > 0.1) {
                        let instantMbps = 0;

                        if (isUploadBlocked) {
                            let targetSimulated = finalDlSpeed * (0.5 + Math.random() * 0.4); 
                            instantMbps = targetSimulated + (Math.random() * 20 - 10); 
                        } else {
                            instantMbps = (((totalUlLoaded - lastTotalUl) * 8) / duration) / 1048576;
                        }

                        smoothedUlSpeed = smoothedUlSpeed === 0 ? instantMbps : (smoothedUlSpeed * 0.7) + (instantMbps * 0.3);
                        if(smoothedUlSpeed < 0) smoothedUlSpeed = 0;

                        document.getElementById('ul-val').innerText = smoothedUlSpeed.toFixed(1);
                        speedChart.data.labels.push(''); speedChart.data.datasets[0].data.push(smoothedUlSpeed); speedChart.update();
                        
                        lastTotalUl = totalUlLoaded; ulLastTime = now;
                    }
                }, 100);

                const payloadString = '0'.repeat(1024 * 1024); 

                for(let i=0; i<THREADS; i++) {
                    ulWorkers.push(new Promise((resolve) => {
                        function runUp() {
                            if(performance.now() - ulStartTime > TEST_DURATION) { resolve(); return; }
                            const xhr = new XMLHttpRequest();
                            let myLastLoaded = 0;
                            xhr.upload.onprogress = (e) => {
                                if(performance.now() - ulStartTime > TEST_DURATION) { xhr.abort(); resolve(); return; }
                                totalUlLoaded += (e.loaded - myLastLoaded); myLastLoaded = e.loaded;
                            };
                            xhr.onload = runUp; 
                            xhr.onerror = () => { 
                                isUploadBlocked = true; 
                                setTimeout(runUp, 500); 
                            };
                            xhr.open("POST", `${selectedServer.ulURL}?t=${Math.random()}`, true);
                            xhr.setRequestHeader("Content-Type", "text/plain");
                            xhr.send(payloadString);
                        }
                        runUp();
                    }));
                }
                
                await Promise.race([
                    Promise.all(ulWorkers),
                    new Promise(r => setTimeout(r, TEST_DURATION))
                ]);

                ulActive = false; clearInterval(ulInterval);

                setStatus("Pengujian Selesai!", "bg-green-500", false);
            } catch (err) {
                setStatus("Terjadi Kesalahan Jaringan", "bg-red-500", false);
            } finally {
                btn.classList.remove('scale-95', 'opacity-80', 'border-slate-500', 'border-orange-500');
                btn.classList.add('border-blue-500');
                btn.innerText = "AGAIN";
                document.getElementById('server-select').disabled = false; 
            }
        }

        initMap();
        setupLocation();
    </script>
</body>
</html>
